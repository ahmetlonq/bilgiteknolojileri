<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EduSoft - Kurbağa ile Algoritma Alıştırması</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Urbanist', sans-serif; }
        body { margin: 0; background: #0f172a; display: flex; height: 100vh; overflow: hidden; }
        
        /* SOL MENÜ */
        .sidebar { width: 280px; background: #1e293b; padding: 40px 20px; color: #64748b; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar h2 { color: #38bdf8; text-align: center; font-size: 32px; margin-bottom: 50px; }
        .sidebar li { list-style: none; padding: 18px 20px; margin-bottom: 10px; border-radius: 12px; }
        .sidebar a { color: inherit; text-decoration: none; display: flex; width: 100%; align-items: center; }
        .sidebar li.active { background: #0ea5e9; color: white; }
        
        .progress-box { margin-top: auto; padding: 20px; background: rgba(15, 23, 42, 0.5); border-radius: 12px; text-align: center; }
        .bar-bg { width: 100%; height: 8px; background: #0f172a; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: #2dd4bf; width: 66%; }

        /* ANA İÇERİK */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .game-card { background: #1e293b; padding: 30px; border-radius: 24px; width: 100%; max-width: 1000px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* OYUN ALANI - Butonun görünmesi için yüksekliği sabitledik */
        .iframe-container { 
            width: 100%; 
            height: 690px; /* Senin verdiğin ölçüye sabitledik, buton şimdi görünecek */
            border-radius: 16px; 
            overflow: hidden; 
            background: #0f172a; 
            border: 2px solid #334155; 
            position: relative; 
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-next { background: #10b981; color: white; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: 700; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>EduSoft</h2>
        <ul>
            <li><a href="index.html">⌂ Ana Sayfa</a></li>
            <li><a href="konu.html">▣ Konu Anlatımı</a></li>
            <li class="active">✎ Alıştırma</li>
            <li><a href="analitik.html">↗ Analitik</a></li>
        </ul>
        <div class="progress-box">
            <div class="bar-bg"><div class="bar-fill"></div></div>
            <h3 style="margin:0; color:#2dd4bf;">%66</h3>
        </div>
    </nav>

    <div class="main">
        <div class="game-card">
            <h1 style="color:white; margin-top:0; font-size:24px;">Etkileşimli Alıştırma: Kurbağa Atlayışı</h1>
            
            <div class="iframe-container">
                <iframe allow="fullscreen; autoplay; allow-top-navigation-by-user-activation" allowfullscreen src="https://www.educaplay.com/game/29573927-kurba_a_oyunu_algoritma.html"></iframe>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <a href="konu.html" style="color:#94a3b8; text-decoration:none; font-weight:700;">◂ Geri Dön</a>
                <a href="analitik.html" class="btn-next">Değerlendirme Paneli ➔</a>
            </div>
        </div>
    </div>

</body>
</html>
