<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>LonqAkademii - Soru Bankası</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Urbanist', sans-serif; background: #f8fafc; padding: 40px; color: #1e293b; }
        .card { background: white; padding: 40px; border-radius: 20px; max-width: 800px; margin: auto; border: 1px solid #e2e8f0; }
        .q-item { margin-bottom: 15px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .options { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        button { cursor: pointer; padding: 8px 16px; border-radius: 6px; border: none; background: #0284c7; color: white; font-weight: 600; }
        .option-btn { background: #f1f5f9; color: #1e293b; margin-right: 10px; }
        .correct { background: #10b981 !important; color: white; }
        .wrong { background: #ef4444 !important; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1>LonqAkademi Soru Bankası</h1>
    <div id="quiz-container">
        <!-- Örnek Soru Yapısı -->
        <div class="q-item">
            <p><strong>Soru 1:</strong> Algoritma kelimesi adını hangi ünlü matematikçiden almıştır?</p>
            <button onclick="toggleOptions(this)">Çöz</button>
            <div class="options">
                <button class="option-btn" onclick="checkAnswer(this, false)">A) İbn-i Sina</button>
                <button class="option-btn" onclick="checkAnswer(this, true)">B) Harezmi</button>
                <button class="option-btn" onclick="checkAnswer(this, false)">C) Ömer Hayyam</button>
            </div>
        </div>

        <div class="q-item">
            <p><strong>Soru 2:</strong> Akış şemalarında elips şekli hangi amaçla kullanılır?</p>
            <button onclick="toggleOptions(this)">Çöz</button>
            <div class="options">
                <button class="option-btn" onclick="checkAnswer(this, true)">A) Başla / Bitir</button>
                <button class="option-btn" onclick="checkAnswer(this, false)">B) Veri Girişi</button>
                <button class="option-btn" onclick="checkAnswer(this, false)">C) Karar Verme</button>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleOptions(btn) {
        btn.nextElementSibling.style.display = 'block';
        btn.style.display = 'none';
    }

    function checkAnswer(btn, isCorrect) {
        if(isCorrect) {
            btn.classList.add('correct');
            alert("Tebrikler! Doğru cevap.");
        } else {
            btn.classList.add('wrong');
            alert("Yanlış, tekrar dene!");
        }
    }
</script>

</body>
</html>
