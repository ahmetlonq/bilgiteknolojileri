<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EduSoft - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Urbanist', sans-serif; }
        body { margin: 0; background-color: #0f172a; display: flex; height: 100vh; color: #f8fafc; }
        .sidebar { width: 280px; background: #1e293b; padding: 40px 20px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar h2 { color: #38bdf8; text-align: center; font-size: 32px; letter-spacing: 2px; margin-bottom: 50px; }
        .sidebar li { list-style: none; padding: 18px 20px; color: #64748b; font-weight: 500; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar li.active { background: #0ea5e9; color: white; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .login-card { background: #1e293b; padding: 60px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; width: 480px; border: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 36px; margin-bottom: 10px; color: white; }
        p { color: #94a3b8; margin-bottom: 40px; font-size: 18px; }
        input { width: 100%; padding: 16px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 25px; transition: 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }
        button { background: #0ea5e9; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; font-size: 18px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>EduSoft</h2>
        <ul><li class="active">⌂ Ana Sayfa</li><li>▣ Konu Anlatımı</li><li>✎ Alıştırma</li><li>↗ Analitik</li></ul>
    </div>
    <div class="main">
        <div class="login-card">
            <h1>Hoş Geldiniz</h1>
            <p>Algoritma Tasarımı eğitim modülüne başlamak için kimliğinizi doğrulayın.</p>
            <input type="text" id="nameInput" placeholder="Adınız ve Soyadınız" autocomplete="off">
            <button onclick="saveAndGo()">Eğitime Başla ➔</button>
        </div>
    </div>
    <script>
        function saveAndGo() {
            let name = document.getElementById("nameInput").value;
            if(name) { localStorage.setItem("ogrenciAdi", name); window.location.href = "konu.html"; }
            else { alert("Devam etmek için isim gerekli!"); }
        }
    </script>
</body>
</html>
