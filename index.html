<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>EduSoft - Giriş</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { color: #38bdf8; text-align: center; }
        .sidebar li { list-style: none; padding: 15px; color: #94a3b8; border-bottom: 1px solid #334155; }
        .sidebar li.active { color: #38bdf8; font-weight: bold; border-left: 4px solid #38bdf8; background: #0f172a; }
        .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .login-card { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 400px; border-top: 5px solid #0284c7; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #0284c7; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>EduSoft</h2>
        <ul><li class="active">⌂ Ana Sayfa</li><li>▣ Konu Anlatımı</li><li>✎ Alıştırma</li><li>↗ Analitik</li></ul>
    </div>
    <div class="main">
        <div class="login-card">
            <h1>Hoş Geldiniz</h1>
            <p>Algoritma modülüne başlamak için adınızı girin.</p>
            <input type="text" id="nameInput" placeholder="Ad Soyad">
            <button onclick="saveAndGo()">Eğitime Başla</button>
        </div>
    </div>
    <script>
        function saveAndGo() {
            let name = document.getElementById("nameInput").value;
            if(name) { localStorage.setItem("ogrenciAdi", name); window.location.href = "konu.html"; }
            else { alert("İsim gerekli!"); }
        }
    </script>
</body>
</html>
