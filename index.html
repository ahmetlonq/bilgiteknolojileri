<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AkademiLMS - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Urbanist', sans-serif; }
        body { margin: 0; background-color: #f8fafc; display: flex; height: 100vh; color: #1e293b; }
        
        /* MODERN AKADEMİ SOL MENÜ */
        .sidebar { width: 280px; background: #ffffff; padding: 40px 20px; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; }
        .sidebar h2 { color: #0284c7; text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 40px; letter-spacing: -0.5px; }
        .sidebar ul { margin: 0; padding: 0; list-style: none; }
        .sidebar li { padding: 14px 18px; color: #64748b; font-weight: 600; border-radius: 8px; margin-bottom: 6px; transition: all 0.2s ease; }
        .sidebar li.active { background: #f0f9ff; color: #0284c7; }
        .sidebar a { color: inherit; text-decoration: none; display: block; }
        .sidebar li:hover:not(.active) { background: #f1f5f9; color: #334155; }
        
        /* NAVİGASYON İLERLEME ÇUBUĞU */
        .nav-progress { margin-top: auto; padding: 20px 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .progress-text { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; font-weight: 600; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: #0284c7; width: 0%; transition: width 0.3s ease; }

        /* ANA İÇERİK ALANI */
        .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 24px 24px; }
        .login-card { background: #ffffff; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); text-align: center; width: 460px; border: 1px solid #e2e8f0; }
        h1 { font-size: 32px; margin-bottom: 10px; color: #0f172a; font-weight: 700; }
        p { color: #64748b; margin-bottom: 35px; font-size: 16px; line-height: 1.5; }
        input { width: 100%; padding: 14px 16px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 10px; color: #1e293b; font-size: 16px; font-weight: 500; margin-bottom: 20px; transition: all 0.2s; }
        input:focus { border-color: #0284c7; background: #ffffff; outline: none; box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1); }
        button { background: #0284c7; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; font-size: 16px; transition: all 0.2s; }
        button:hover { background: #0369a1; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>AkademiLMS</h2>
        <ul>
            <li class="active"><a href="index.html">⌂ Ana Sayfa</a></li>
            <li><a href="hedefler.html">🎯 Hedefler</a></li>
            <li><a href="kazanimlar.html">✓ Kazanımlar</a></li>
            <li><a href="konu.html">▣ Konu Anlatımı</a></li>
            <li><a href="ornek.html">★ Örnekler</a></li>
            <li><a href="alistirma.html">✎ Alıştırma</a></li>
            <li><a href="soru_bankasi.html">? Soru Bankası</a></li>
            <li><a href="analitik.html">↗ Analitik</a></li>
        </ul>
        <div class="nav-progress">
            <div class="progress-text"><span>Eğitim Süreci</span><span>%0</span></div>
            <div class="bar-bg"><div class="bar-fill"></div></div>
        </div>
    </div>
    <div class="main">
        <div class="login-card">
            <div style="font-size: 40px; margin-bottom: 15px;">🏫</div>
            <h1>Yönetim Paneli</h1>
            <p>Python ile Algoritma Tasarımı akademik modülüne başlamak için öğrenci bilgilerinizi giriniz.</p>
            <input type="text" id="nameInput" placeholder="Adınız ve Soyadınız" autocomplete="off">
            <button onclick="saveAndGo()">Modülü Başlat ➔</button>
        </div>
    </div>
    <script>
        function saveAndGo() {
            let name = document.getElementById("nameInput").value;
            if(name.trim() !== "") { localStorage.setItem("ogrenciAdi", name); window.location.href = "hedefler.html"; }
            else { alert("Lütfen adınızı giriniz."); }
        }
    </script>
</body>
</html>
